<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook — pomnavi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="alternate" type="application/rss+xml" title="Guestbook Feed" href="/.netlify/functions/rss" />

    <style>
       /* Guestbook Title Font */
     @import url('https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap');

      .cherry-bomb-one-regular {
        font-family: "Cherry Bomb One", system-ui;
        font-weight: 400;
        font-style: normal;
      }
      
      h1 {
            font-family: Cherry Bomb One; /* use font */
         } 
    </style>
</head>
<body>

    <h1>Navi's Guestbook</h1>
    <p><small><a href="archive.html">Static Archive</a></small></p>
    
    <form id="guestbook-form">
        <div class="hidden">
            <input name="honeypot" id="honeypot">
        </div>

        <input type="text" id="name" placeholder="Name" required>
        <div class="form-row">
            <input type="text" id="websiteName" placeholder="Website Name (optional)">
            <input type="url" id="websiteUrl" placeholder="https://yoursite.com (optional)">
        </div>
        <textarea id="message" placeholder="Write something...plaintext only :)" rows="4" required></textarea>
        <button type="submit">Post Message</button>
    </form>

    <div id="entries"><p>Loading entries... <br>
    <small>Taking too long or don't use Javascript? View the <a href="archive.html">Static Archive</a>.</small></p>
    </div>
    

    <div id="pagination" class="pagination-container"></div>

    <script src="guestbook.js"></script>

    <footer>
        <a href="https://pomnavi.net">pomnavi.net</a> | 
        <a href="#" onclick="enableAdmin(); return false;">Admin</a>
    </footer>
</body>
</html>
