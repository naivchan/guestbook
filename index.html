<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Guestbook</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }
        .entry { border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>
    <h1>Guestbook</h1>
    
    <form id="guestbook-form">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="text" id="websiteName" placeholder="Website Name (Optional)">
        <input type="url" id="websiteUrl" placeholder="https://yourlink.com (Optional)">
        <textarea id="message" placeholder="Leave a message..." required></textarea>
        <button type="submit">Sign Guestbook</button>
    </form>

    <div id="entries">Loading entries...</div>

    <script>
        const entriesDiv = document.getElementById('entries');
        const form = document.getElementById('guestbook-form');
        let isAdmin = false;
        let adminPassword = "";
        
        // Toggle Admin Mode
        function enableAdmin() {
            const pass = prompt("Enter Admin Password:");
            if (pass) {
                adminPassword = pass;
                isAdmin = true;
                loadEntries(); // Refresh to show buttons
            }
        }
        
        async function sendReply(id) {
            const reply = prompt("Enter your reply:");
            if (!reply) return;
        
            const res = await fetch('/.netlify/functions/admin-reply', {
                method: 'POST',
                body: JSON.stringify({ id, reply, password: adminPassword })
            });
        
            if (res.ok) {
                loadEntries();
            } else {
                alert("Admin check failed.");
            }
        }
        
        async function loadEntries() {
            const res = await fetch('/.netlify/functions/get-entries');
            const entries = await res.json();
            
            entriesDiv.innerHTML = entries.map(e => `
                <div class="entry" style="border-bottom: 1px solid #eee; padding: 10px 0;">
                    <strong>${e.name}</strong> 
                    ${e.websiteUrl ? `<a href="${e.websiteUrl}" target="_blank">(${e.websiteName || 'Web'})</a>` : ''}
                    <small style="color: #888;">${new Date(e.date).toLocaleDateString()}</small>
                    <p>${e.message}</p>
                    
                    ${e.adminReply ? `
                        <div style="margin: 10px 0 10px 20px; padding: 10px; background: #f9f9f9; border-left: 3px solid #00adff;">
                            <strong>Reply:</strong> ${e.adminReply}
                        </div>
                    ` : ''}
        
                    ${isAdmin ? `<button onclick="sendReply(${e.id})">Reply as Admin</button>` : ''}
                </div>
            `).join('');
        }
        
        // Existing form submit logic
        form.onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                websiteName: document.getElementById('websiteName').value,
                websiteUrl: document.getElementById('websiteUrl').value,
                message: document.getElementById('message').value
            };
            await fetch('/.netlify/functions/post-entry', { method: 'POST', body: JSON.stringify(data) });
            form.reset();
            loadEntries();
        };
        
        loadEntries();
    </script>
<hr>
<p style="text-align: center;">
    <a href="#" onclick="enableAdmin(); return false;" style="color: #ccc; font-size: 0.8rem;">Admin Login</a>
</p>
</body>
</html>
