<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook — pomnavi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Guestbook</h1>
    
    <form id="guestbook-form">
        <div class="hidden">
            <input name="honeypot" id="honeypot">
        </div>

        <input type="text" id="name" placeholder="Name" required>
        <div class="form-row">
            <input type="text" id="websiteName" placeholder="Website Name">
            <input type="url" id="websiteUrl" placeholder="URL (https://...)">
        </div>
        <textarea id="message" placeholder="Write something..." rows="4" required></textarea>
        <button type="submit">Post Message</button>
    </form>

    <div id="entries">Loading...</div>

    <div id="pagination" class="pagination-container"></div>

    <script>
        const entriesDiv = document.getElementById('entries');
        const paginationDiv = document.getElementById('pagination');
        const form = document.getElementById('guestbook-form');
        let isAdmin = false;
        let adminPassword = "";
        let currentPage = 1;

        function enableAdmin() {
            const pass = prompt("Admin Password:");
            if (pass) {
                adminPassword = pass;
                isAdmin = true;
                loadEntries(currentPage);
            }
        }

        async function deleteEntry(id) {
            if (!confirm("Delete this entry?")) return;
            await fetch('/.netlify/functions/delete-entry', {
                method: 'POST',
                body: JSON.stringify({ id, password: adminPassword })
            });
            loadEntries(currentPage);
        }

        async function sendReply(id) {
            const reply = prompt("Admin Reply:");
            if (!reply) return;
            await fetch('/.netlify/functions/admin-reply', {
                method: 'POST',
                body: JSON.stringify({ id, reply, password: adminPassword })
            });
            loadEntries(currentPage);
        }

        // 2. Updated loadEntries to handle pagination and permalinks
        async function loadEntries(page = 1) {
            currentPage = page;
            const res = await fetch(`/.netlify/functions/get-entries?page=${page}`);
            const data = await res.json();
            
            // Render Entries
            entriesDiv.innerHTML = data.entries.map(e => {
                const entryId = `entry-${e.id}`;
                return `
                <div class="entry" id="${entryId}">
                    <div class="entry-header">
                        <div>
                            <span class="entry-author">${e.name}</span>
                            <a href="#${entryId}" class="permalink">#</a>
                            ${e.websiteUrl ? `<span class="entry-website">@ <a href="${e.websiteUrl}" target="_blank">${e.websiteName || 'Link'}</a></span>` : ''}
                        </div>
                        <span class="entry-date">${new Date(e.date).toLocaleDateString()}</span>
                    </div>
                    <div class="entry-body">${e.message}</div>
                    
                    ${e.adminReply ? `
                        <div class="admin-reply">
                            <strong>Navi:</strong> ${e.adminReply}
                        </div>
                    ` : ''}

                    ${isAdmin ? `
                        <div class="admin-controls">
                            <button onclick="sendReply(${e.id})">Reply</button>
                            <button class="btn-delete" onclick="deleteEntry(${e.id})">Delete</button>
                        </div>
                    ` : ''}
                </div>
            `}).join('');

            renderPagination(data.totalPages, data.currentPage);
            handleHighlight();
        }

        // 3. New Helper: Render the numbered buttons
        function renderPagination(total, current) {
            paginationDiv.innerHTML = '';
            if (total <= 1) return;

            for (let i = 1; i <= total; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `page-link ${i === current ? 'active' : ''}`;
                btn.onclick = () => {
                    loadEntries(i);
                    window.scrollTo({ top: form.offsetTop, behavior: 'smooth' });
                };
                paginationDiv.appendChild(btn);
            }
        }

        // 4. New Helper: Highlight a permalinked entry
        function handleHighlight() {
            const hash = window.location.hash;
            if (hash) {
                const target = document.querySelector(hash);
                if (target) {
                    // Remove highlight from others
                    document.querySelectorAll('.entry').forEach(el => el.classList.remove('highlight-entry'));
                    // Add to target
                    target.classList.add('highlight-entry');
                }
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (document.getElementById('honeypot').value !== "") return;

            const data = {
                id: Date.now(),
                date: new Date().toISOString(),
                name: document.getElementById('name').value,
                websiteName: document.getElementById('websiteName').value,
                websiteUrl: document.getElementById('websiteUrl').value,
                message: document.getElementById('message').value
            };
            
            await fetch('/.netlify/functions/post-entry', { method: 'POST', body: JSON.stringify(data) });
            form.reset();
            loadEntries(1); // Refresh to first page to see the new post
        };

        // Initialize
        loadEntries();
        window.addEventListener('hashchange', handleHighlight);
    </script>

    <footer>
        <a href="https://pomnavi.net">pomnavi.net</a> | 
        <a href="#" onclick="enableAdmin(); return false;">Admin</a>
    </footer>
</body>
</html>
