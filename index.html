<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Guestbook</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }
        .entry { border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>
    <h1>Guestbook</h1>
    
    <form id="guestbook-form">
        <input type="text" id="name" placeholder="Your Name" required>
        <textarea id="message" placeholder="Leave a message..." required></textarea>
        <button type="submit">Sign Guestbook</button>
    </form>

    <div id="entries">Loading entries...</div>

    <script>
        const entriesDiv = document.getElementById('entries');
        const form = document.getElementById('guestbook-form');

        // Fetch and display entries
        async function loadEntries() {
            const res = await fetch('/.netlify/functions/get-entries');
            const entries = await res.json();
            entriesDiv.innerHTML = entries.length ? entries.map(e => `
                <div class="entry">
                    <strong>${e.name}</strong> (${new Date(e.date).toLocaleDateString()})<br>
                    ${e.message}
                </div>
            `).join('') : 'No entries yet. Be the first!';
        }

        // Handle form submission
        form.onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                message: document.getElementById('message').value
            };

            await fetch('/.netlify/functions/post-entry', {
                method: 'POST',
                body: JSON.stringify(data)
            });

            form.reset();
            loadEntries();
        };

        loadEntries();
    </script>
</body>
</html>
