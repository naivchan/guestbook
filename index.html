<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook — pomnavi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Guestbook</h1>
    
    <form id="guestbook-form">
        <div class="hidden">
            <input name="honeypot" id="honeypot">
        </div>

        <input type="text" id="name" placeholder="Name" required>
        <div class="form-row">
            <input type="text" id="websiteName" placeholder="Website Name">
            <input type="url" id="websiteUrl" placeholder="URL (https://...)">
        </div>
        <textarea id="message" placeholder="Write something..." rows="4" required></textarea>
        <button type="submit">Post Message</button>
    </form>

    <div id="entries">Loading...</div>

    <script>
        /* Keep all the JavaScript we wrote previously here */
        const entriesDiv = document.getElementById('entries');
        const form = document.getElementById('guestbook-form');
        let isAdmin = false;
        let adminPassword = "";

        function enableAdmin() {
            const pass = prompt("Admin Password:");
            if (pass) {
                adminPassword = pass;
                isAdmin = true;
                loadEntries();
            }
        }

        async function deleteEntry(id) {
            if (!confirm("Delete this entry?")) return;
            await fetch('/.netlify/functions/delete-entry', {
                method: 'POST',
                body: JSON.stringify({ id, password: adminPassword })
            });
            loadEntries();
        }

        async function sendReply(id) {
            const reply = prompt("Admin Reply:");
            if (!reply) return;
            await fetch('/.netlify/functions/admin-reply', {
                method: 'POST',
                body: JSON.stringify({ id, reply, password: adminPassword })
            });
            loadEntries();
        }

        async function loadEntries() {
            const res = await fetch('/.netlify/functions/get-entries');
            const entries = await res.json();
            
            entriesDiv.innerHTML = entries.map(e => `
                <div class="entry">
                    <div class="entry-header">
                        <div>
                            <span class="entry-author">${e.name}</span>
                            ${e.websiteUrl ? `<span class="entry-website">@ <a href="${e.websiteUrl}" target="_blank">${e.websiteName || 'Link'}</a></span>` : ''}
                        </div>
                        <span class="entry-date">${new Date(e.date).toLocaleDateString()}</span>
                    </div>
                    <div class="entry-body">${e.message}</div>
                    
                    ${e.adminReply ? `
                        <div class="admin-reply">
                            <strong>Navi:</strong> ${e.adminReply}
                        </div>
                    ` : ''}

                    ${isAdmin ? `
                        <div class="admin-controls">
                            <button onclick="sendReply(${e.id})">Reply</button>
                            <button class="btn-delete" onclick="deleteEntry(${e.id})">Delete</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (document.getElementById('honeypot').value !== "") return;

            const data = {
                id: Date.now(),
                name: document.getElementById('name').value,
                websiteName: document.getElementById('websiteName').value,
                websiteUrl: document.getElementById('websiteUrl').value,
                message: document.getElementById('message').value
            };
            
            await fetch('/.netlify/functions/post-entry', { method: 'POST', body: JSON.stringify(data) });
            form.reset();
            loadEntries();
        };

        loadEntries();
    </script>

    <footer>
        <a href="https://pomnavi.net">pomnavi.net</a> | 
        <a href="#" onclick="enableAdmin(); return false;">Admin</a>
    </footer>
</body>
</html>
